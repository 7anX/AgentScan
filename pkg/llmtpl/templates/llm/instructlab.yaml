info:
  name: instructlab
  author: agentscan
  severity: high
  desc: InstructLab — community-driven LLM fine-tuning platform
  metadata:
    product: instructlab
    vendor: instructlab
  priority: 43

http:
  - method: GET
    path: '/'
    matchers:
      - body="Hello from InstructLab! Visit us at https://instructlab.ai"

stage2: []

version: []

models:
  - method: GET
    path: '/v1/models'
    extractor:
      part: body
      type: json_array
      json_path: 'data[*].id'

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]

risk:
  open_with_models: critical
  open_no_models: high
  auth_required: medium

negatives: []
