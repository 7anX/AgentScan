info:
  name: tabbyapi
  author: agentscan
  severity: high
  desc: TabbyAPI — OpenAI-compatible exllamav2 API server
  metadata:
    product: tabbyapi
    vendor: theroyallab
  priority: 8

http:
  - method: GET
    path: '/.well-known/serviceinfo'
    matchers:
      - body="\"TabbyAPI\"" && body="\"software\""

stage2: []

version: []

models:
  - method: GET
    path: '/v1/models'
    extractor:
      part: body
      type: json_array
      json_path: 'data[*].id'

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]

risk:
  open_with_models: critical
  open_no_models: high
  auth_required: medium

negatives: []
