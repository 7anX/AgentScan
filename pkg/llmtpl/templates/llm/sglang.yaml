info:
  name: sglang
  author: agentscan
  severity: high
  desc: SGLang high-performance LLM inference framework
  metadata:
    product: sglang
    vendor: sgl-project
  priority: 11

http:
  - method: GET
    path: '/get_model_info'
    matchers:
      - body="\"model_path\"" && body="\"is_generation\""
  - method: GET
    path: '/v1/models'
    matchers:
      - 'body="\"owned_by\":\"sglang\"" || body="\"owned_by\": \"sglang\""'

stage2:
  - method: GET
    path: '/get_server_info'
    matchers:
      - body="\"version\"" && body="\"machine_infos\""

version:
  - method: GET
    path: '/get_server_info'
    extractor:
      part: body
      group: 1
      regex: '"version":"([^"]+)"'

models:
  - method: GET
    path: '/v1/models'
    extractor:
      part: body
      type: json_array
      json_path: 'data[*].id'

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]

risk:
  open_with_models: critical
  open_no_models: high
  auth_required: medium

negatives:
  - 'body="\"owned_by\":\"vllm\"" || body="\"owned_by\": \"vllm\""'
