info:
  name: koboldcpp
  author: agentscan
  severity: high
  desc: KoboldCpp — local AI inference server
  metadata:
    product: koboldcpp
    vendor: koboldcpp
  priority: 6

http:
  - method: GET
    path: '/api/extra/version'
    matchers:
      - 'body="\"result\": \"KoboldCpp\""'
  - method: GET
    path: '/v1/models'
    matchers:
      - 'body="\"owned_by\": \"koboldcpp\""'

stage2: []

version:
  - method: GET
    path: '/api/extra/version'
    extractor:
      part: body
      group: 1
      regex: '"version":"([^"]+)"'

models:
  - method: GET
    path: '/v1/models'
    extractor:
      part: body
      type: json_array
      json_path: 'data[*].id'

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]

risk:
  open_with_models: critical
  open_no_models: high
  auth_required: medium

negatives:
  - 'body="\"owned_by\":\"vllm\"" || body="\"owned_by\": \"vllm\""'
  - 'body="\"owned_by\":\"sglang\"" || body="\"owned_by\": \"sglang\""'
  - body="\"owned_by\":\"llamacpp\""
  - 'body="\"owned_by\":\"fastchat\"" || body="\"owned_by\": \"fastchat\""'
  - body="\"owned_by\":\"local-ai\""
