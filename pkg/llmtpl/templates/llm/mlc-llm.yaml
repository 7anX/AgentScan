info:
  name: mlc-llm
  author: agentscan
  severity: high
  desc: MLC-LLM — universal LLM deployment engine
  metadata:
    product: mlc-llm
    vendor: mlc-ai
  priority: 39

http:
  - method: GET
    path: '/v1/models'
    matchers:
      - body="\"MLC-LLM\""
  - method: GET
    path: '/openapi.json'
    matchers:
      - body="/microserving/prep_recv"

stage2: []

version: []

models:
  - method: GET
    path: '/v1/models'
    extractor:
      part: body
      type: json_array
      json_path: 'data[*].id'

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]

risk:
  open_with_models: critical
  open_no_models: high
  auth_required: medium

negatives:
  - 'body="\"owned_by\":\"vllm\"" || body="\"owned_by\": \"vllm\""'
  - 'body="\"owned_by\":\"sglang\"" || body="\"owned_by\": \"sglang\""'
  - body="\"owned_by\":\"llamacpp\""
  - 'body="\"owned_by\":\"fastchat\"" || body="\"owned_by\": \"fastchat\""'
  - body="\"owned_by\":\"local-ai\""
