info:
  name: aphrodite-engine
  author: agentscan
  severity: high
  desc: Aphrodite Engine — large-scale inference engine
  metadata:
    product: aphrodite-engine
    vendor: pygmalionai
  priority: 8

http:
  - method: GET
    path: '/.well-known/serviceinfo'
    matchers:
      - body="\"Aphrodite Engine\"" && body="\"software\""

stage2: []

version: []

models:
  - method: GET
    path: '/v1/models'
    extractor:
      part: body
      type: json_array
      json_path: 'data[*].id'

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]

risk:
  open_with_models: critical
  open_no_models: high
  auth_required: medium

negatives: []
