info:
  name: triton
  author: agentscan
  severity: high
  desc: NVIDIA Triton Inference Server
  metadata:
    product: triton
    vendor: nvidia
  priority: 14

http:
  - method: GET
    path: '/v2'
    matchers:
      - body="\"name\"" && body="\"extensions\"" && body="triton"

stage2: []

version:
  - method: GET
    path: '/v2'
    extractor:
      part: body
      group: 1
      regex: '"version":"([^"]+)"'

models: []

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]

risk:
  open_with_models: critical
  open_no_models: high
  auth_required: medium

negatives: []
