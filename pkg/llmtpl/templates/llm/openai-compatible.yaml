info:
  name: openai-compatible
  author: agentscan
  severity: high
  desc: Generic OpenAI-compatible API (fallback)
  metadata:
    product: openai-compatible
    vendor: generic
  priority: 99

http:
  - method: GET
    path: '/v1/models'
    matchers:
      - body="\"object\"" && body="\"data\""

stage2: []
version: []

models:
  - method: GET
    path: '/v1/models'
    extractor:
      part: body
      type: json_array
      json_path: 'data[*].id'

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]
  auth_keywords: ["api key", "unauthorized", "authentication"]

risk:
  open_with_models: critical
  open_no_models: high
  auth_required: medium

negatives: []
