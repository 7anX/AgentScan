info:
  name: lmdeploy
  author: agentscan
  severity: high
  desc: LMDeploy inference toolkit by InternLM
  metadata:
    product: lmdeploy
    vendor: internlm
  priority: 45

http:
  - method: GET
    path: '/docs'
    matchers:
      - body="LMDeploy API Server - Swagger UI"

stage2: []

version:
  - method: GET
    path: '/openapi.json'
    extractor:
      part: body
      group: 1
      regex: '"version"\s*:\s*"([0-9]+\.[0-9]+\.[0-9]+)"'

models:
  - method: GET
    path: '/v1/models'
    extractor:
      part: body
      type: json_array
      json_path: 'data[*].id'

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]

risk:
  open_with_models: high
  open_no_models: high
  auth_required: medium

negatives: []
