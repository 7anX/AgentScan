info:
  name: lm-studio
  author: agentscan
  severity: high
  desc: LM Studio local LLM server
  metadata:
    product: lm-studio
    vendor: lmstudio
  priority: 40

http:
  - method: GET
    path: '/lmstudio-greeting'
    matchers:
      - body="\"lmstudio\"" && body="true"
  - method: GET
    path: '/api/v0/models'
    matchers:
      - body="\"object\"" && body="\"data\""

stage2: []
version: []

models:
  - method: GET
    path: '/v1/models'
    extractor:
      part: body
      type: json_array
      json_path: 'data[*].id'
  - method: GET
    path: '/api/v0/models'
    extractor:
      part: body
      type: json_array
      json_path: 'data[*].id'

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]

risk:
  open_with_models: high
  open_no_models: high
  auth_required: medium

negatives: []
