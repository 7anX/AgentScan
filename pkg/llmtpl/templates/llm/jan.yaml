info:
  name: jan
  author: agentscan
  severity: high
  desc: Jan — open-source local AI assistant
  metadata:
    product: jan
    vendor: jan-ai
  priority: 44

http:
  - method: GET
    path: '/openapi.json'
    matchers:
      - 'body="\"title\": \"Jan API Server Endpoints\""'

stage2: []

version: []

models:
  - method: GET
    path: '/v1/models'
    extractor:
      part: body
      type: json_array
      json_path: 'data[*].id'

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]

risk:
  open_with_models: critical
  open_no_models: high
  auth_required: medium

negatives: []
