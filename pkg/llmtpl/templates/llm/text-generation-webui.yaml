info:
  name: text-generation-webui
  author: agentscan
  severity: high
  desc: Text Generation Web UI — Gradio-based LLM interface
  metadata:
    product: text-generation-webui
    vendor: oobabooga
  priority: 50

http:
  - method: GET
    path: '/'
    matchers:
      - body="Text Generation Web UI"

stage2: []

version: []

models:
  - method: GET
    path: '/v1/models'
    extractor:
      part: body
      type: json_array
      json_path: 'data[*].id'

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]

risk:
  open_with_models: critical
  open_no_models: high
  auth_required: medium

negatives: []
