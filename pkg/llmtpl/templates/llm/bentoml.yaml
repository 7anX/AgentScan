info:
  name: bentoml
  author: agentscan
  severity: high
  desc: BentoML — unified model serving framework
  metadata:
    product: bentoml
    vendor: bentoml
  priority: 42

http:
  - method: GET
    path: '/metrics'
    matchers:
      - body="bentoml_api_server"
  - method: GET
    path: '/'
    matchers:
      - body="BentoML Prediction Service"

stage2:
  - method: GET
    path: '/docs.json'
    matchers:
      - body="BentoML Team"

version: []

models: []

auth:
  endpoint: '/v1/models'
  open_status: [200]
  auth_status: [401, 403]

risk:
  open_with_models: critical
  open_no_models: high
  auth_required: medium

negatives: []
